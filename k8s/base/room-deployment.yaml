apiVersion: apps/v1
kind: Deployment
metadata:
  name: room
  labels:
    app: room
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: room
  template:
    metadata:
      labels:
        app: room
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats 4222; do
                echo "waiting for nats..."
                sleep 5
              done
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z api 8080; do
                echo "waiting for api..."
                sleep 5
              done
      containers:
        - name: room
          image: winterhaven-room:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: room-secret
