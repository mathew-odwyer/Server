name: Build

on:
  push:
    branches: [ "dev" ]
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches: [ "dev" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_server:
    name: Build Server
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/Server.slnx
        env: # TODO: Remove this, hack fix for this issue: https://github.com/reactiveui/refit/issues/2114
          # Stops NuGet from going online to check revocation status
          NUGET_CERT_REVOCATION_MODE: offline

      - name: Build
        run: dotnet build src/Server.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Server.slnx --configuration Release --no-build --verbosity normal

  build_room:
    name: Build Room Service
    runs-on: windows-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
    
      - name: Setup
        id: igor
        uses: bscotch/igor-setup@v1.3.0
        with:
          cache: true # Cache the runtime for subsequent builds.
          access-key: ${{secrets.ACCESS_KEY}} # https://gamemaker.io/account/access-keys
          target-yyp: ${{ github.workspace }}/src/Room/Room.yyp

      - name: Build
        uses: bscotch/igor-build@v1.3.2
        with:
          yyc: false # Compile using VM instead of YYC.
          yyp-path: ${{ github.workspace }}/src/Room/Room.yyp
          user-dir: ${{ steps.igor.outputs.user-dir }}