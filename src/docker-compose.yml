name: winterhaven

services:
  caddy:
    container_name: caddy
    image: winterhaven-caddy
    build: 
      context: ./Caddy
      dockerfile: Dockerfile
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - "caddy_data:/data"
      - "caddy_config:/config"
      - ./Caddy/Production.Caddyfile:/etc/caddy/Caddyfile
    networks:
      - network
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "http://localhost/"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:alpine
    networks:
      - network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 5s

  nats:
    container_name: nats
    image: winterhaven-nats
    build:
      context: ./NATS
      dockerfile: Dockerfile
    networks:
      - network
    expose:
      - "9222"
    volumes:
      - ./NATS/nats-production.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 5s

  web:
    container_name: web
    image: winterhaven-web
    build:
      context: ./Web
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    networks:
      - network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/Health/Get"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 5s
    restart: unless-stopped      

  database:
    container_name: database
    image: winterhaven-database
    build:
      context: ./Web/Winterhaven.Infrastructure
      dockerfile: Dockerfile
    volumes:
      - db_data:/var/opt/mssql
      - data-protection-keys:/root/.aspnet/DataProtection-Keys
    networks:
      - network
    expose:
      - "1433"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 5s
      retries: 10
      start_period: 20s
      timeout: 5s
    restart: unless-stopped

  # # server:
  # #   container_name: server
  # #   image: winterhaven-server
  # #   build: 
  # #     context: ./Server/build
  # #     dockerfile: Dockerfile.Run
  # #   expose:
  # #     - "8080"
  # #   networks:
  # #     - network
  # #   depends_on:
  # #     web:
  # #       condition: service_healthy
  # #   healthcheck:
  # #     test: >
  # #       sh -c "echo | websocat -n --connect ws://localhost:8080 >/dev/null 2>&1"
  # #     interval: 10s
  # #     timeout: 5s
  # #     retries: 5
  # #     start_period: 5s
  # #   restart: unless-stopped

  gateway:
    container_name: gateway
    image: winterhaven-gateway
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/get"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 5s    
    
networks:
  network:
    driver: bridge

volumes:
  redis_data:
  caddy_data:
  caddy_config:
  data-protection-keys:
  db_data:
    driver: local